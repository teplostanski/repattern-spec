server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Безопасность: скрываем версию Nginx в заголовках
    server_tokens off;

    # 2. Защита скрытых файлов (.env, .git, .DS_Store)
    # log_not_found off - именно эта строчка убирает спам из error.log!
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 3. Блокировка популярных путей ботов (чтобы не создавать нагрузку)
    location ~* (actuator|graphql|server-status|console|wp-admin|wp-login) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 4. Кэширование статики Astro (файлы с хэшами в папке /_astro/)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 5. Gzip-сжатие для ускорения загрузки сайта
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 6. Роутинг (отдача кастомной 404 страницы от Astro)
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }
}
